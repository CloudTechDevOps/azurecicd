name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

env:
  REGISTRY: narni.azurecr.io
  APP_NAME: cloud-app
  TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔐 Login to Azure Container Registry
    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 🐳 Build and push Docker image
    - name: Build and Push Docker Image
      run: |
        docker build -t $REGISTRY/$APP_NAME:$TAG .
        docker push $REGISTRY/$APP_NAME:$TAG

    # 🚀 SSH into VM and deploy
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set +e

          echo "Logging into ACR..."
          echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY -u "${{ secrets.ACR_USERNAME }}" --password-stdin

          echo "Pulling image..."
          docker pull $REGISTRY/$APP_NAME:$TAG

          echo "Stopping old container..."
          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          echo "Running new container..."
          docker run -d -p 80:80 --name $APP_NAME $REGISTRY/$APP_NAME:$TAG

          echo "Deployment complete 🚀"
