name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

env:
  REGISTRY: narni.azurecr.io
  APP_NAME: cloud-app
  TAG: ${{ github.run_number }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t $REGISTRY/$APP_NAME:$TAG -f myapp/Dockerfile myapp
        docker push $REGISTRY/$APP_NAME:$TAG

    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        #key: ${{ secrets.SSH_PRIVATE_KEY }}
        password: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set +e

          echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY -u "${{ secrets.ACR_USERNAME }}" --password-stdin

          docker pull $REGISTRY/$APP_NAME:$TAG

          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          docker run -d -p 80:80 --name $APP_NAME $REGISTRY/$APP_NAME:$TAG
